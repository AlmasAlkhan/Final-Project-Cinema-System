services:
  postgres:
    image: postgres:15
    container_name: cinema-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: movie_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d movie_db"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    container_name: cinema-nats
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
