services:
  postgres:
    image: postgres:15
    container_name: cinema-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movie_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    container_name: cinema-nats
    ports:
      - "4222:4222"
